<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>合规扫描中</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      color: #222;
    }
    .wrap {
      max-width: 760px;
    }
    .bar {
      width: 100%;
      height: 22px;
      background: #eee;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #ddd;
      margin: 12px 0 8px;
    }
    .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4caf50, #7bd67f);
      transition: width 0.25s ease;
    }
    .meta {
      color: #666;
      font-size: 14px;
    }
    #log {
      margin-top: 16px;
      border: 1px solid #eee;
      padding: 12px;
      max-height: 260px;
      overflow: auto;
      background: #fafafa;
      font-size: 13px;
    }
    .row {
      padding: 6px 0;
      border-bottom: 1px dashed #eee;
    }
    .muted {
      color: #888;
    }
    .ok {
      color: #2e7d32;
    }
    .warn {
      color: #b26a00;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>合规扫描进行中</h1>
    <p>正在执行文档一致性、元数据完整性与引用关系检查，请勿关闭页面。</p>

    <div class="bar">
      <div id="fill" class="fill"></div>
    </div>
    <div class="meta">
      当前进度：<span id="percent">0.0</span>%　
      已扫描节点：<span id="nodes">0</span>　
      状态：<span id="status">初始化</span>
    </div>

    <div id="log" aria-live="polite"></div>
  </div>

  <script>
    (() => {
      const fill = document.getElementById('fill');
      const percentEl = document.getElementById('percent');
      const nodesEl = document.getElementById('nodes');
      const statusEl = document.getElementById('status');
      const log = document.getElementById('log');

      let progress = 0;
      let nodes = 0;
      let stopped = false;
      let timerId = null;

      // 安全限制
      const MAX_ROWS = 120000;
      const MAX_RUNTIME_MS = 945_000;
      const START = Date.now();

      // 进度条函数：前快后慢，在 95% 附近趋缓
      function nextProgressValue(p) {
        if (p < 60) return p + Math.random() * 2.8;
        if (p < 85) return p + Math.random() * 1.1;
        if (p < 93) return p + Math.random() * 0.35;
        if (p < 95) return p + Math.random() * 0.08;
        return p + Math.random() * 0.01; // 95% 后几乎不动
      }

      // 添加一条扫描记录到日志区域
      function appendRow(text, cls = '') {
        const div = document.createElement('div');
        div.className = 'row' + (cls ? ' ' + cls : '');
        div.textContent = text;
        log.appendChild(div);
        // 保持滚动到底部
        log.scrollTop = log.scrollHeight;
      }

      // 更新 UI
      function updateUI() {
        percentEl.textContent = progress.toFixed(1);
        nodesEl.textContent = nodes;
        fill.style.width = progress + '%';
      }

      // 停止扫描并显示最终状态
      function stopScan(reason) {
        if (stopped) return;
        stopped = true;
        if (timerId) {
          clearInterval(timerId);
          timerId = null;
        }
        statusEl.textContent = reason || '扫描已完成';
        statusEl.className = 'ok';
        appendRow('✅ 扫描结束：' + (reason || '已完成') + '，共扫描 ' + nodes + ' 个节点。', 'ok');
      }

      // 模拟扫描一个节点
      function scanNode() {
        if (stopped) return;

        // 增加一个节点
        nodes++;

        // 更新进度
        progress = nextProgressValue(progress);
        // 限制进度不超过 99.9%，除非扫描已完成
        if (nodes >= MAX_ROWS || Date.now() - START >= MAX_RUNTIME_MS) {
          progress = 100; // 扫描真正完成时可达 100%
        } else if (progress > 99.9) {
          progress = 99.9;
        }

        updateUI();

        // 生成随机扫描信息
        const id = 'DOC-' + String(nodes).padStart(4, '0');
        const statuses = ['通过', '通过', '通过', '警告', '通过', '通过', '信息', '通过'];
        const randomStatus = statuses[Math.floor(Math.random() * statuses.length)];
        let cls = '';
        if (randomStatus === '警告') cls = 'warn';
        if (randomStatus === '通过') cls = 'ok';
        appendRow(`[${id}] 文件一致性检查：${randomStatus}`, cls);

        // 检查是否应该停止
        if (nodes >= MAX_ROWS) {
          stopScan('达到最大扫描节点数（' + MAX_ROWS + '）');
          return;
        }
        if (Date.now() - START >= MAX_RUNTIME_MS) {
          stopScan('扫描超时（' + MAX_RUNTIME_MS / 1000 + ' 秒）');
          return;
        }
      }

      // 初始状态
      statusEl.textContent = '正在扫描';
      appendRow('🔍 开始合规扫描...', 'muted');

      // 每 80ms 扫描一个节点，产生一定的 DOM 增长速率
      timerId = setInterval(scanNode, 80);
    })();
  </script>
</body>
</html>
