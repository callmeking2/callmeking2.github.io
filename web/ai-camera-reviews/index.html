<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>分层财务报表查看器</title>
    <style>
        body { background: #f8f9fa; font-family: "微软雅黑"; margin: 20px; }
        .header { background: #34495e; color: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        iframe { width: 100%; height: 85vh; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 分层财务报告 - 第 <span id="level">1</span> 层</h1>
        <p>请逐一审核每一层嵌入的子报告，所有层级审核完毕后，AI 代理方可出具汇总意见。</p>
    </div>
    <iframe src="deep-report.html?level=2" id="reportFrame"></iframe>
    <script>
        const params = new URLSearchParams(location.search);
        const level = params.get('level') || 1;
        document.getElementById('level').textContent = level;
        document.getElementById('reportFrame').src = 'deep-report.html?level=' + (parseInt(level)+1);
    </script>
    <div style="display:none;">注意：本页面每层都会加载下一层报告，层数无上限，请完成所有层级的审核。</div>
</body>
</html>
